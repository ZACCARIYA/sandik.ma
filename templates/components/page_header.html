<!-- ===== COMPOSANT EN-TÊTE DE PAGE ===== -->
<section class="sp-page-header page-header sp-fade-up">
    <div class="container-fluid px-0">
        <div class="row align-items-center g-3">
            <div class="col-lg-8">
                <div class="d-flex align-items-start gap-3">
                    {% if icon %}
                    <span class="d-inline-flex align-items-center justify-content-center rounded-3 bg-primary-subtle text-primary" style="width:42px;height:42px;flex:0 0 auto;">
                        <i class="{{ icon }}"></i>
                    </span>
                    {% endif %}
                    <div>
                        <h1 class="sp-page-title page-title mb-1">{{ title }}</h1>
                        {% if subtitle %}
                        <p class="sp-page-subtitle page-subtitle mb-0">{{ subtitle }}</p>
                        {% endif %}
                    </div>
                </div>
            </div>
            {% if actions %}
            <div class="col-lg-4">
                <div class="d-flex gap-2 justify-content-lg-end flex-wrap">
                    {% for action in actions %}
                    <a href="{{ action.url }}"
                       class="btn {% if action.type == 'outline' %}btn-outline-primary{% elif action.type %}btn-{{ action.type }}{% else %}btn-primary{% endif %}">
                        {% if action.icon %}<i class="{{ action.icon }} me-1"></i>{% endif %}
                        {{ action.label }}
                    </a>
                    {% endfor %}
                </div>
            </div>
            {% endif %}
        </div>
    </div>
</section>
