<!-- ===== COMPOSANT CARTE STATISTIQUE ===== -->
<article class="stats-card sp-kpi-card {% if class %}{{ class }}{% endif %}">
    <div class="d-flex justify-content-between align-items-start mb-3">
        <div class="stats-meta">
            <p class="stats-label mb-1">{{ label }}</p>
            <h3 class="stats-value mb-0 text-{{ color|default:'primary' }}">{{ value|default:'0' }}</h3>
        </div>
        {% if icon %}
        <span class="d-inline-flex align-items-center justify-content-center rounded-3 bg-{{ color|default:'primary' }}-subtle text-{{ color|default:'primary' }}"
              style="width:40px;height:40px;">
            <i class="{{ icon }}"></i>
        </span>
        {% endif %}
    </div>
    {% if trend %}
    <div class="stats-trend small text-{{ trend.type|default:'muted' }}">
        <i class="fas fa-arrow-{{ trend.direction|default:'up' }} me-1"></i>{{ trend.value }}
    </div>
    {% endif %}
</article>
